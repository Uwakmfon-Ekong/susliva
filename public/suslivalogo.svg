  <desc>SUSLIVA logo with hands and leaf mark on dark forest green background</desc>

  <!-- Background -->
  <rect width="280" height="72" rx="8" fill="#1B4332"/>

  <!-- Icon circle -->
  <circle cx="36" cy="36" r="26" fill="#2D6A4F"/>

