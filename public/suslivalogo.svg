  <path d="M47 45 C47 38, 36 34, 36 34" fill="none" stroke="#B7E4C7" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="24" x2="36" y2="46" stroke="#B7E4C7" stroke-width="1.5" stroke-linecap="round"/>

